PART
{
	name = chemical-tech-tree-icon-Kerosene
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-Kerosene
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-Kerosene
	partIcon = chemical-tech-tree-icon-Kerosene
	entryCost = 0
	title = #LOC_ChemicalCore_Kerosene_title
	manufacturer = #LOC_ChemicalCore_basics_manufacturer_title
	description = #LOC_ChemicalCore_Kerosene_description
	techRequired = ChemicalTechTree_Kerosene
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-Kerosene]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[Kerosene]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[Kerosene]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}