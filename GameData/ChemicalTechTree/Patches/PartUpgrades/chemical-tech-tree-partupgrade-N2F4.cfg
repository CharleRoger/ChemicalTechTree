PART
{
	name = chemical-tech-tree-icon-N2F4
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-N2F4
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-N2F4
	partIcon = chemical-tech-tree-icon-N2F4
	entryCost = 0
	title = #LOC_ChemicalCore_N2F4_title
	manufacturer = #LOC_ChemicalCore_exotics_manufacturer_title
	description = #LOC_ChemicalCore_N2F4_description
	techRequired = ChemicalTechTree_N2F4
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-N2F4]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[N2F4]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[N2F4]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}