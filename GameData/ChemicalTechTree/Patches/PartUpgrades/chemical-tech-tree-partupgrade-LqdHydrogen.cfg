PART
{
	name = chemical-tech-tree-icon-LqdHydrogen
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-LqdHydrogen
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-LqdHydrogen
	partIcon = chemical-tech-tree-icon-LqdHydrogen
	entryCost = 0
	title = #LOC_ChemicalCore_LqdHydrogen_title
	manufacturer = #LOC_ChemicalCore_cryogenics_manufacturer_title
	description = #LOC_ChemicalCore_LqdHydrogen_description
	techRequired = ChemicalTechTree_LqdHydrogen
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-LqdHydrogen]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[LqdHydrogen]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[LqdHydrogen]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}