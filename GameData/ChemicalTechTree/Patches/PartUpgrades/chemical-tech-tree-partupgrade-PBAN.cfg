PART
{
	name = chemical-tech-tree-icon-PBAN
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-PBAN
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-PBAN
	partIcon = chemical-tech-tree-icon-PBAN
	entryCost = 0
	title = #LOC_ChemicalCore_PBAN_title
	manufacturer = #LOC_ChemicalCore_solids_manufacturer_title
	description = #LOC_ChemicalCore_PBAN_description
	techRequired = ChemicalTechTree_PBAN
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-PBAN]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[PBAN]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[PBAN]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}