PART
{
	name = chemical-tech-tree-icon-LqdMethane
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-LqdMethane
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-LqdMethane
	partIcon = chemical-tech-tree-icon-LqdMethane
	entryCost = 0
	title = #LOC_ChemicalCore_LqdMethane_title
	manufacturer = #LOC_ChemicalCore_cryogenics_manufacturer_title
	description = #LOC_ChemicalCore_LqdMethane_description
	techRequired = ChemicalTechTree_LqdMethane
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-LqdMethane]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[LqdMethane]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[LqdMethane]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}