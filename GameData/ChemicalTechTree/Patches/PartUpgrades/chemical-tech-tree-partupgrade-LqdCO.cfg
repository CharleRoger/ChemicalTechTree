PART
{
	name = chemical-tech-tree-icon-LqdCO
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-LqdCO
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-LqdCO
	partIcon = chemical-tech-tree-icon-LqdCO
	entryCost = 0
	title = #LOC_ChemicalCore_LqdCO_title
	manufacturer = #LOC_ChemicalCore_cryogenics_manufacturer_title
	description = #LOC_ChemicalCore_LqdCO_description
	techRequired = ChemicalTechTree_LqdCO
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-LqdCO]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[LqdCO]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[LqdCO]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}