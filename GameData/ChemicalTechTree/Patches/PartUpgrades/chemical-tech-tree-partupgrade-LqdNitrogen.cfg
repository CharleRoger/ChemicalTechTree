PART
{
	name = chemical-tech-tree-icon-LqdNitrogen
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-LqdNitrogen
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-LqdNitrogen
	partIcon = chemical-tech-tree-icon-LqdNitrogen
	entryCost = 0
	title = #LOC_ChemicalCore_LqdNitrogen_title
	manufacturer = #LOC_ChemicalCore_cryogenics_manufacturer_title
	description = #LOC_ChemicalCore_LqdNitrogen_description
	techRequired = ChemicalTechTree_LqdNitrogen
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-LqdNitrogen]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[LqdNitrogen]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[LqdNitrogen]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}