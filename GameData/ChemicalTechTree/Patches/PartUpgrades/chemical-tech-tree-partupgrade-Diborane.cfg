PART
{
	name = chemical-tech-tree-icon-Diborane
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-Diborane
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-Diborane
	partIcon = chemical-tech-tree-icon-Diborane
	entryCost = 0
	title = #LOC_ChemicalCore_Diborane_title
	manufacturer = #LOC_ChemicalCore_exotics_manufacturer_title
	description = #LOC_ChemicalCore_Diborane_description
	techRequired = ChemicalTechTree_Diborane
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-Diborane]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[Diborane]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[Diborane]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}