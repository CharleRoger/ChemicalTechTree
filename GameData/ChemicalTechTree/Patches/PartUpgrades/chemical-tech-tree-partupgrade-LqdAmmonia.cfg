PART
{
	name = chemical-tech-tree-icon-LqdAmmonia
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-LqdAmmonia
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-LqdAmmonia
	partIcon = chemical-tech-tree-icon-LqdAmmonia
	entryCost = 0
	title = #LOC_ChemicalCore_LqdAmmonia_title
	manufacturer = #LOC_ChemicalCore_basics_manufacturer_title
	description = #LOC_ChemicalCore_LqdAmmonia_description
	techRequired = ChemicalTechTree_LqdAmmonia
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-LqdAmmonia]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[LqdAmmonia]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[LqdAmmonia]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}