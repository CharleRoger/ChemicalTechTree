PART
{
	name = chemical-tech-tree-icon-Water
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-Water
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-Water
	partIcon = chemical-tech-tree-icon-Water
	entryCost = 0
	title = #LOC_ChemicalCore_Water_title
	manufacturer = #LOC_ChemicalCore_basics_manufacturer_title
	description = #LOC_ChemicalCore_Water_description
	techRequired = ChemicalTechTree_Water
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-Water]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[Water]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[Water]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}