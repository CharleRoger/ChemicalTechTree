PART
{
	name = chemical-tech-tree-icon-Ethanol
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-Ethanol
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-Ethanol
	partIcon = chemical-tech-tree-icon-Ethanol
	entryCost = 0
	title = #LOC_ChemicalCore_Ethanol_title
	manufacturer = #LOC_ChemicalCore_basics_manufacturer_title
	description = #LOC_ChemicalCore_Ethanol_description
	techRequired = ChemicalTechTree_Ethanol
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-Ethanol]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[Ethanol]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[Ethanol]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}