PART
{
	name = chemical-tech-tree-icon-LqdCO2
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-LqdCO2
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-LqdCO2
	partIcon = chemical-tech-tree-icon-LqdCO2
	entryCost = 0
	title = #LOC_ChemicalCore_LqdCO2_title
	manufacturer = #LOC_ChemicalCore_basics_manufacturer_title
	description = #LOC_ChemicalCore_LqdCO2_description
	techRequired = ChemicalTechTree_LqdCO2
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-LqdCO2]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[LqdCO2]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[LqdCO2]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}