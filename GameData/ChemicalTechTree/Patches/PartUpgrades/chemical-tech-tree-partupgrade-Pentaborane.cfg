PART
{
	name = chemical-tech-tree-icon-Pentaborane
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-Pentaborane
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-Pentaborane
	partIcon = chemical-tech-tree-icon-Pentaborane
	entryCost = 0
	title = #LOC_ChemicalCore_Pentaborane_title
	manufacturer = #LOC_ChemicalCore_exotics_manufacturer_title
	description = #LOC_ChemicalCore_Pentaborane_description
	techRequired = ChemicalTechTree_Pentaborane
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-Pentaborane]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[Pentaborane]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[Pentaborane]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}