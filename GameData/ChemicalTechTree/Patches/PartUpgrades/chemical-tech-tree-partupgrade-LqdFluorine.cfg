PART
{
	name = chemical-tech-tree-icon-LqdFluorine
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-LqdFluorine
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-LqdFluorine
	partIcon = chemical-tech-tree-icon-LqdFluorine
	entryCost = 0
	title = #LOC_ChemicalCore_LqdFluorine_title
	manufacturer = #LOC_ChemicalCore_exotics_manufacturer_title
	description = #LOC_ChemicalCore_LqdFluorine_description
	techRequired = ChemicalTechTree_LqdFluorine
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-LqdFluorine]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[LqdFluorine]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[LqdFluorine]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}