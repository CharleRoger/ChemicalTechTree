PART
{
	name = chemical-tech-tree-icon-NTO
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-NTO
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-NTO
	partIcon = chemical-tech-tree-icon-NTO
	entryCost = 0
	title = #LOC_ChemicalCore_NTO_title
	manufacturer = #LOC_ChemicalCore_hypergolics_manufacturer_title
	description = #LOC_ChemicalCore_NTO_description
	techRequired = ChemicalTechTree_NTO
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-NTO]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[NTO]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[NTO]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}