PART
{
	name = chemical-tech-tree-icon-PSPC
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-PSPC
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-PSPC
	partIcon = chemical-tech-tree-icon-PSPC
	entryCost = 0
	title = #LOC_ChemicalCore_PSPC_title
	manufacturer = #LOC_ChemicalCore_solids_manufacturer_title
	description = #LOC_ChemicalCore_PSPC_description
	techRequired = ChemicalTechTree_PSPC
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-PSPC]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[PSPC]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[PSPC]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}