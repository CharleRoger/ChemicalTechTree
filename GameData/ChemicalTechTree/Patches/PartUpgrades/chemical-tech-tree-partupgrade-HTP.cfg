PART
{
	name = chemical-tech-tree-icon-HTP
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-HTP
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-HTP
	partIcon = chemical-tech-tree-icon-HTP
	entryCost = 0
	title = #LOC_ChemicalCore_HTP_title
	manufacturer = #LOC_ChemicalCore_basics_manufacturer_title
	description = #LOC_ChemicalCore_HTP_description
	techRequired = ChemicalTechTree_HTP
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-HTP]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[HTP]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[HTP]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}