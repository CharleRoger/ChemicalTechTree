PART
{
	name = chemical-tech-tree-icon-Hydrazine
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-Hydrazine
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-Hydrazine
	partIcon = chemical-tech-tree-icon-Hydrazine
	entryCost = 0
	title = #LOC_ChemicalCore_Hydrazine_title
	manufacturer = #LOC_ChemicalCore_hypergolics_manufacturer_title
	description = #LOC_ChemicalCore_Hydrazine_description
	techRequired = ChemicalTechTree_Hydrazine
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-Hydrazine]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[Hydrazine]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[Hydrazine]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}