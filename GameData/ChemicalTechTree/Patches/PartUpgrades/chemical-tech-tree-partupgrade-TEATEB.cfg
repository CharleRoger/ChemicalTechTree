PART
{
	name = chemical-tech-tree-icon-TEATEB
	module = Part
	author = Charles Rogers
	MODEL
	{
		model = ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-plane
		texture = chemical-tech-tree-icon-Water, ChemicalTechTree/Assets/Icons/chemical-tech-tree-icon-TEATEB
	}
	TechHidden = true
	category = none
}

PARTUPGRADE
{
	name = chemical-tech-tree-partupgrade-TEATEB
	partIcon = chemical-tech-tree-icon-TEATEB
	entryCost = 0
	title = #LOC_ChemicalCore_TEATEB_title
	manufacturer = #LOC_ChemicalCore_exotics_manufacturer_title
	description = #LOC_ChemicalCore_TEATEB_description
	techRequired = ChemicalTechTree_TEATEB
}
@PARTUPGRADE[chemical-tech-tree-partupgrade-TEATEB]:AFTER[CommunityResourcePack]
{
	cost = #$@RESOURCE_DEFINITION[TEATEB]/unitCost$
	@cost *= 1000
	density = #$@RESOURCE_DEFINITION[TEATEB]/density$
	@density *= 1000000
	basicInfo = #<color=#ACFFFC><b>Cost:</b> $cost$ funds/m³\n<b>Density:</b> $density$ kg/m³</color>
}