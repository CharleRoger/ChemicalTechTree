@TechTree:NEEDS[UnKerballedStart]:FOR[ChemicalTechTree]
{
	%chemTechX0 = -3800
	%chemTechX1 = -3600
	%chemTechX2 = -3400
	%chemTechX3 = -3200
	%chemTechX4 = -3000
	%chemTechX5 = -2800
	%chemTechX6 = -2600
	%chemTechX7 = -2400
	%chemTechX8 = -2200

	%chemTechY0 = 1910
	%chemTechY1 = 1968
	%chemTechY2 = 2026
	%chemTechY3 = 2084
	%chemTechY4 = 2142
	%chemTechY5 = 2200
}

@TechTree:NEEDS[UnKerballedStart]:FOR[zzzzUnKerballedStart]
{
	@RDNode:HAS[#id[generalRocketry]]
	{
		@pos = -3400,2110,0
	}
	@RDNode:HAS[#id[advRocketry]]
	{
		@pos = -3200,2110,0
	}
	@RDNode:HAS[~id[ChemicalTechTree_*],~id[tier*]],*
	{
		%posX = #$pos$
		@posX ^= :(.+)\,.+\,.+:$1:

		%posY = #$pos$
		@posY ^= :.+\,(.+)\,.+:$1:
		@posY *= 0.825
		@posY += 37

		%pos = #$posX$,$posY$,0
	}
}