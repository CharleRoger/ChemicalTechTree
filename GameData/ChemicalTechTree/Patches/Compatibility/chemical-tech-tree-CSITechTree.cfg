@TechTree:NEEDS[CSITechTree]:FOR[ChemicalTechTree]
{
	%chemTechX0 = -3800
	%chemTechX1 = -3700
	%chemTechX2 = -3600
	%chemTechX3 = -3500
	%chemTechX4 = -3400
	%chemTechX5 = -3300
	%chemTechX6 = -3200
	%chemTechX7 = -3100
	%chemTechX8 = -3000

	%chemTechY0 = 2040
	%chemTechY1 = 2080
	%chemTechY2 = 2120
	%chemTechY3 = 2160
	%chemTechY4 = 2200
	%chemTechY5 = 2240
}

@TechTree:NEEDS[CSITechTree]:AFTER[zzz_ChemicalTechTree]
{
	@RDNode:HAS[#id[ChemicalTechTree_*]],*
	{
		%scale = 0.5
	}
}

@TechTree:NEEDS[CSITechTree]:AFTER[zzzCSITechTree]
{
	@RDNode:HAS[~id[ChemicalTechTree_*],~id[tier*]],*
	{
		%posX = #$pos$
		@posX ^= :(.+)\,.+\,.+:$1:

		%posY = #$pos$
		@posY ^= :.+\,(.+)\,.+:$1:
		@posY -= 80

		%pos = #$posX$,$posY$,0
	}
}