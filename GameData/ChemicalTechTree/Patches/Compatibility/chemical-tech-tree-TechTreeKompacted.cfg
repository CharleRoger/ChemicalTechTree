@TechTree:NEEDS[TechTreeKompacted]:AFTER[zzz_ChemicalTechTree]
{
	@RDNode:HAS[#id[ChemicalTechTree_*]],*
	{
		%scale = 0.5
	}
}

@TechTree:NEEDS[TechTreeKompacted,!CommunityTechTree]:AFTER[zzz_ChemicalTechTree]
{
	@RDNode:HAS[~id[ChemicalTechTree_*],~id[tier*]],*
	{
		%posX = #$pos$
		@posX ^= :(.+)\,.+\,.+:$1:

		%posY = #$pos$
		@posY ^= :.+\,(.+)\,.+:$1:
		@posY -= 360

		%pos = #$posX$,$posY$,0
	}
}

@TechTree:NEEDS[TechTreeKompacted,CommunityTechTree]:AFTER[zzz_ChemicalTechTree]
{
	@RDNode:HAS[~id[ChemicalTechTree_*],~id[tier*]],*
	{
		%posX = #$pos$
		@posX ^= :(.+)\,.+\,.+:$1:

		%posY = #$pos$
